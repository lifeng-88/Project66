# Vivide iOS：Archive → Export → 上传 App Store Connect
#
# 所需 Secrets（Repository → Settings → Secrets and variables → Actions）：
#   APPLE_TEAM_ID                      Apple Developer Team ID
#   APP_STORE_CONNECT_ISSUER_ID        App Store Connect API Issuer ID
#   APP_STORE_CONNECT_KEY_ID           API Key ID
#   APP_STORE_CONNECT_API_PRIVATE_KEY  API 私钥 (.p8) 全文
#
# 触发方式：
#   - 推送 tag：v*（如 v1.0.0）→ 默认上传 App Store Connect
#   - Actions 页手动 Run workflow

name: iOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "Marketing Version（留空则用工程默认值）"
        required: false
        type: string
      build_number:
        description: "Build Number（留空则自动取 Connect 最新值 +1）"
        required: false
        type: string
      upload:
        description: "上传到 App Store Connect"
        required: true
        type: boolean
        default: true

defaults:
  run:
    working-directory: vivide

env:
  XCODE_PROJECT: vivide.xcodeproj
  SCHEME: vivide
  BUNDLE_ID: com.mindspark.net
  MIN_MARKETING_VERSION: "1.0"

jobs:
  release:
    name: Archive & Upload
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify secrets
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          missing=()
          [ -z "$APPLE_TEAM_ID" ] && missing+=("APPLE_TEAM_ID")
          [ -z "$APP_STORE_CONNECT_ISSUER_ID" ] && missing+=("APP_STORE_CONNECT_ISSUER_ID")
          [ -z "$APP_STORE_CONNECT_KEY_ID" ] && missing+=("APP_STORE_CONNECT_KEY_ID")
          [ -z "$APP_STORE_CONNECT_API_PRIVATE_KEY" ] && missing+=("APP_STORE_CONNECT_API_PRIVATE_KEY")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::缺少 Secrets: ${missing[*]}"
            exit 1
          fi

      - name: Prepare App Store Connect API key
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          KEY_DIR="$HOME/private_keys"
          mkdir -p "$KEY_DIR"
          KEY_PATH="$KEY_DIR/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          printf '%s\n' "$APP_STORE_CONNECT_API_PRIVATE_KEY" > "$KEY_PATH"
          if ! grep -q "BEGIN PRIVATE KEY" "$KEY_PATH"; then
            echo "::error::APP_STORE_CONNECT_API_PRIVATE_KEY 格式无效，须包含 BEGIN/END PRIVATE KEY"
            exit 1
          fi
          echo "APP_STORE_CONNECT_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Resolve version overrides
        id: version
        env:
          INPUT_MARKETING: ${{ github.event.inputs.marketing_version }}
          INPUT_BUILD: ${{ github.event.inputs.build_number }}
          BUNDLE_ID: ${{ env.BUNDLE_ID }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_PATH: ${{ env.APP_STORE_CONNECT_KEY_PATH }}
        run: |
          MARKETING="$INPUT_MARKETING"
          MIN_MARKETING="${MIN_MARKETING_VERSION:-1.0}"

          if [ -z "$MARKETING" ] && [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            MARKETING="${GITHUB_REF_NAME#v}"
          fi

          if [ -n "$MARKETING" ]; then
            LOWEST=$(printf '%s\n' "$MARKETING" "$MIN_MARKETING" | sort -V | head -1)
            if [ "$LOWEST" = "$MARKETING" ] && [ "$MARKETING" != "$MIN_MARKETING" ]; then
              echo "::error::Marketing Version \`$MARKETING\` 低于最低要求 \`$MIN_MARKETING\`"
              exit 1
            fi
            echo "MARKETING_VERSION=$MARKETING" >> "$GITHUB_ENV"
          else
            echo "未指定 Marketing Version，使用工程 project.pbxproj 默认值"
          fi

          echo "marketing_version=${MARKETING:-project-default}" >> "$GITHUB_OUTPUT"

          python3 ci/resolve_build_number.py

      - name: Log resolved versions
        run: |
          echo "MARKETING_VERSION=${MARKETING_VERSION:-project-default}"
          echo "CURRENT_PROJECT_VERSION=${CURRENT_PROJECT_VERSION:?CURRENT_PROJECT_VERSION is missing}"

      - name: Resolve upload mode
        id: mode
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "upload=true" >> "$GITHUB_OUTPUT"
          else
            echo "upload=${{ github.event.inputs.upload }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch release entitlements (Push production)
        run: |
          /usr/libexec/PlistBuddy -c "Set :aps-environment production" vivide/vivide.entitlements
          /usr/libexec/PlistBuddy -c "Print" vivide/vivide.entitlements

      - name: Prepare CI signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: python3 ci/prepare_ci_signing.py

      - name: Ensure CI device registered
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_PATH: ${{ env.APP_STORE_CONNECT_KEY_PATH }}
          BUNDLE_ID: ${{ env.BUNDLE_ID }}
        run: python3 ci/ensure_ci_device.py

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages"

      - name: Verify bundle identifier
        id: bundle
        run: |
          set -euo pipefail
          EXPECTED="${{ env.BUNDLE_ID }}"

          BUNDLE_ID=$(xcodebuild -showBuildSettings \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            2>/dev/null | sed -n '/^[[:space:]]*PRODUCT_BUNDLE_IDENTIFIER = /{
              s/^[[:space:]]*PRODUCT_BUNDLE_IDENTIFIER = //
              p
              q
            }')

          if [ -z "$BUNDLE_ID" ]; then
            BUNDLE_ID=$(grep -m1 'PRODUCT_BUNDLE_IDENTIFIER' "$XCODE_PROJECT/project.pbxproj" \
              | sed 's/.*PRODUCT_BUNDLE_IDENTIFIER = \(.*\);/\1/')
          fi

          echo "Bundle ID: ${BUNDLE_ID}"
          if [ "$BUNDLE_ID" != "$EXPECTED" ]; then
            echo "::error::Bundle ID 应为 ${EXPECTED}，当前为 ${BUNDLE_ID:-（空）}"
            exit 1
          fi
          echo "bundle_id=${BUNDLE_ID}" >> "$GITHUB_OUTPUT"

      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/vivide.xcarchive"

          echo "DEVELOPMENT_TEAM=${APPLE_TEAM_ID}"

          COMMON_SIGN_ARGS=(
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"
            CODE_SIGN_STYLE=Automatic
            CODE_SIGN_IDENTITY=-
            AD_HOC_CODE_SIGNING_ALLOWED=YES
            PROVISIONING_PROFILE_SPECIFIER=
            PROVISIONING_PROFILE=
          )

          AUTH_ARGS=(
            -allowProvisioningUpdates
            -allowProvisioningDeviceRegistration
            -authenticationKeyPath "$APP_STORE_CONNECT_KEY_PATH"
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID"
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"
          )

          xcodebuild -showBuildSettings \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            "${COMMON_SIGN_ARGS[@]}" \
            2>/dev/null | grep -E 'CODE_SIGN_STYLE|DEVELOPMENT_TEAM|PROVISIONING_PROFILE|CODE_SIGN_IDENTITY' | head -20

          echo "预热签名资源（创建证书 / Development 描述文件）..."
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
            "${COMMON_SIGN_ARGS[@]}" \
            "${AUTH_ARGS[@]}" \
            -quiet

          XCODEBUILD_ARGS=(
            -project "$XCODE_PROJECT"
            -scheme "$SCHEME"
            -configuration Release
            -destination "generic/platform=iOS"
            -archivePath "$ARCHIVE_PATH"
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages"
            "${COMMON_SIGN_ARGS[@]}"
            "${AUTH_ARGS[@]}"
          )

          if [ -n "${MARKETING_VERSION:-}" ]; then
            XCODEBUILD_ARGS+=(MARKETING_VERSION="$MARKETING_VERSION")
          fi
          if [ -n "${CURRENT_PROJECT_VERSION:-}" ]; then
            XCODEBUILD_ARGS+=(CURRENT_PROJECT_VERSION="$CURRENT_PROJECT_VERSION")
            echo "Archive CURRENT_PROJECT_VERSION=$CURRENT_PROJECT_VERSION"
          else
            echo "::error::CURRENT_PROJECT_VERSION 未设置，无法保证上传唯一 Build Number"
            exit 1
          fi

          xcodebuild archive "${XCODEBUILD_ARGS[@]}"

          echo "ARCHIVE_PATH=$ARCHIVE_PATH" >> "$GITHUB_ENV"

      - name: Export / Upload
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          UPLOAD: ${{ steps.mode.outputs.upload }}
        run: |
          set -euo pipefail
          EXPORT_DIR="$RUNNER_TEMP/export"
          EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"

          if [ "$UPLOAD" = "true" ]; then
            DESTINATION="upload"
          else
            DESTINATION="export"
          fi

          python3 -c "
          import plistlib
          plist = {
              'method': 'app-store-connect',
              'destination': '${DESTINATION}',
              'signingStyle': 'automatic',
              'teamID': '${APPLE_TEAM_ID}',
              'uploadSymbols': False,
              'manageAppVersionAndBuildNumber': False,
          }
          with open('${EXPORT_OPTIONS}', 'wb') as f:
              plistlib.dump(plist, f)
          "

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_DIR" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$APP_STORE_CONNECT_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

          if [ "$DESTINATION" = "export" ]; then
            IPA_PATH="$EXPORT_DIR/${SCHEME}.ipa"
            if [ ! -f "$IPA_PATH" ]; then
              IPA_PATH="$(find "$EXPORT_DIR" -name '*.ipa' -print -quit)"
            fi
            echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"
          fi

      - name: Upload IPA artifact
        if: steps.mode.outputs.upload != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vivide-ipa
          path: ${{ env.IPA_PATH }}
          retention-days: 14
          if-no-files-found: error

      - name: Summary
        env:
          UPLOAD: ${{ steps.mode.outputs.upload }}
        run: |
          {
            echo "### iOS Release"
            echo ""
            echo "| 项 | 值 |"
            echo "|---|---|"
            echo "| Scheme | ${{ env.SCHEME }} |"
            echo "| Bundle ID | ${{ steps.bundle.outputs.bundle_id }} |"
            if [ -n "${MARKETING_VERSION:-}" ]; then
              echo "| Marketing Version | ${MARKETING_VERSION} |"
            fi
            if [ -n "${CURRENT_PROJECT_VERSION:-}" ]; then
              echo "| Build Number | ${CURRENT_PROJECT_VERSION} |"
            fi
            if [ "$UPLOAD" = "true" ]; then
              echo "| 结果 | 已上传 App Store Connect |"
            elif [ -n "${IPA_PATH:-}" ]; then
              echo "| IPA | ${IPA_PATH} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
