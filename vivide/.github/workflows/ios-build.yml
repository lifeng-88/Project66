# Vivide iOS：模拟器编译检查（无需签名 Secrets）
# 在 push / PR 到 main 时自动运行

name: iOS Build

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "Web/**"
      - "ci/**"
      - "*.md"
      - ".github/workflows/ios-release.yml"
  pull_request:
    paths-ignore:
      - "Web/**"
      - "ci/**"
      - "*.md"
      - ".github/workflows/ios-release.yml"
  workflow_dispatch:

env:
  XCODE_PROJECT: vivide.xcodeproj
  SCHEME: vivide

jobs:
  build:
    name: Simulator Build
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages"

      - name: Build for simulator
        run: |
          set -euo pipefail
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES

      - name: Verify bridge-test assets
        run: node Scripts/verify-bridge-runtime.js
        working-directory: vivide
