# 此文件为 vivide 子目录独立仓库时的副本。
# 当前 monorepo 根目录请使用：../../.github/workflows/ios-build.yml

name: iOS Build (vivide subdir)

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: .

env:
  XCODE_PROJECT: vivide.xcodeproj
  SCHEME: vivide

jobs:
  build:
    name: Simulator Build
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - run: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO
