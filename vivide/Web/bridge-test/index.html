<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bridge 自动测试</title>
  <style>
    :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; padding: 16px; background: #0d0d11; color: #f2f2f7; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { color: #9a9aa5; font-size: 13px; margin: 0 0 12px; }
    h2 { font-size: 14px; color: #c7c7d1; margin: 16px 0 8px; font-weight: 600; }
    .grid { display: grid; gap: 8px; }
    button {
      border: 0; border-radius: 12px; padding: 12px 14px; text-align: left;
      background: #1c1c22; color: #fff; font-size: 14px;
    }
    button.primary { background: #5b4b8a; }
    button.manual { background: #2a2438; }
    button:active { opacity: 0.8; }
    #log {
      margin-top: 16px; padding: 12px; border-radius: 12px; background: #111117;
      font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: pre-wrap; word-break: break-word; min-height: 160px; max-height: 45vh; overflow: auto;
    }
    .ok { color: #6ee7a8; }
    .err { color: #ff8a8a; }
    .muted { color: #9a9aa5; }
  </style>
</head>
<body>
  <h1>Bridge 自动测试</h1>
  <p>在 Vivide iOS WebView 中运行，验证 syncAppInfo Bridge。自动组可无人值守；手动组需点选/授权/关页。</p>
  <div class="grid" id="topActions"></div>
  <h2>自动（可批量）</h2>
  <div class="grid" id="autoActions"></div>
  <h2>手动（需交互）</h2>
  <div class="grid" id="manualActions"></div>
  <div id="log"></div>

  <script>
    const SAMPLE_IMAGE =
      "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=200&q=60";
    const SAMPLE_PAGE = "https://example.com/";
    const pending = new Map();
    let seq = 0;

    window.__syncAppInfoResolve = function (requestId, payload) {
      const entry = pending.get(requestId);
      if (!entry) return;
      pending.delete(requestId);
      clearTimeout(entry.timer);
      entry.resolve(payload);
    };

    function callNative(typeName, params = {}, timeoutMs = 20000) {
      return new Promise((resolve, reject) => {
        const requestId = "req-" + (++seq) + "-" + Date.now();
        const timer = setTimeout(() => {
          pending.delete(requestId);
          reject(new Error("timeout: " + typeName));
        }, timeoutMs);
        pending.set(requestId, { resolve, reject, timer });
        const payload = { requestId, typeName, params };
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.syncAppInfo) {
          window.webkit.messageHandlers.syncAppInfo.postMessage(payload);
        } else {
          clearTimeout(timer);
          pending.delete(requestId);
          reject(new Error("syncAppInfo handler missing"));
        }
      });
    }

    const logEl = document.getElementById("log");
    function log(line, ok) {
      const span = document.createElement("div");
      span.className = ok === true ? "ok" : ok === false ? "err" : "muted";
      span.textContent = line;
      logEl.appendChild(span);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function summarize(res) {
      try {
        const text = JSON.stringify(res);
        return text.length > 500 ? text.slice(0, 500) + "…" : text;
      } catch (_) {
        return String(res);
      }
    }

    async function run(label, typeName, params, options = {}) {
      const timeoutMs = options.timeoutMs || 20000;
      const acceptErrorCodes = options.acceptErrorCodes || [];
      try {
        const res = await callNative(typeName, params, timeoutMs);
        const code = res && res.error && res.error.code;
        const ok =
          (res && res.ok !== false) ||
          (acceptErrorCodes.length > 0 && acceptErrorCodes.includes(code));
        log((ok ? "PASS " : "FAIL ") + label + ": " + summarize(res), ok);
        return ok;
      } catch (e) {
        log("FAIL " + label + ": " + e.message, false);
        return false;
      }
    }

    // [label, typeName, params, options?]
    const autoTests = [
      ["getAppInfo", "getAppInfo", {}],
      ["getDeviceId", "getDeviceId", {}],
      ["showToast", "showToast", { message: "Bridge toast OK" }],
      ["setJSONCache", "setJSONCache", { namespace: "bridgeTest", key: "ping", value: { t: Date.now() }, ttlSeconds: 60 }],
      ["getJSONCache", "getJSONCache", { namespace: "bridgeTest", key: "ping" }],
      ["getLaunchPushPayload", "getLaunchPushPayload", {}],
      ["registerPush", "registerPush", {}, { timeoutMs: 30000 }],
      ["prepareLoginAttribution", "prepareLoginAttribution", {}, { timeoutMs: 45000 }],
      ["markLoginCompleted", "markLoginCompleted", {}],
      ["logAnalyticsEvent", "logAnalyticsEvent", { eventName: "bridge_test_event", values: { source: "bridge-test" } }],
      ["prefetchMedia", "prefetchMedia", { url: SAMPLE_IMAGE, mediaType: "image" }, { timeoutMs: 45000 }],
      ["getCachedMediaURL", "getCachedMediaURL", { url: SAMPLE_IMAGE, mediaType: "image" }],
      ["restorePayment", "restorePayment", {}, { timeoutMs: 45000 }],
      ["finishPaymentTransaction(empty)", "finishPaymentTransaction", { transactionId: "" }, {
        acceptErrorCodes: ["INVALID_TRANSACTION", "TRANSACTION_NOT_FOUND", "FINISH_FAILED"]
      }],
      ["openURL(https)", "openURL", { url: SAMPLE_PAGE }],
      ["openWebView", "openWebView", { url: SAMPLE_PAGE, title: "Bridge Test" }],
      ["openSettings", "openSettings", {}],
      ["back", "back", {}],
      ["clearCache", "clearCache", {}],
    ];

    const manualTests = [
      ["pickPhoto", "pickPhoto", {}, { timeoutMs: 120000 }],
      ["saveMediaToAlbum", "saveMediaToAlbum", {
        url: SAMPLE_IMAGE,
        mediaType: "image",
        fileName: "bridge-test.jpg"
      }, {
        timeoutMs: 60000,
        acceptErrorCodes: ["PHOTO_LIBRARY_PERMISSION_DENIED"]
      }],
      ["openPayment(web)", "openPayment", {
        url: SAMPLE_PAGE,
        type: "web",
        orderId: "bridge-test-order"
      }, { timeoutMs: 120000 }],
      ["openPayment(apple_pay缺参)", "openPayment", {
        type: "apple_pay"
      }, {
        timeoutMs: 30000,
        acceptErrorCodes: ["INVALID_PRODUCT", "PURCHASE_FAILED", "STOREKIT_UNAVAILABLE"]
      }],
    ];

    function mountButtons(containerId, tests, className) {
      const el = document.getElementById(containerId);
      tests.forEach(([label, typeName, params, options]) => {
        const btn = document.createElement("button");
        btn.textContent = label;
        if (className) btn.className = className;
        btn.onclick = () => run(label, typeName, params, options || {});
        el.appendChild(btn);
      });
    }

    async function runSuite(name, tests) {
      logEl.textContent = "";
      log("—— " + name + " ——", null);
      let passed = 0;
      for (const [label, typeName, params, options] of tests) {
        if (await run(label, typeName, params, options || {})) passed += 1;
      }
      log("SUMMARY " + name + ": " + passed + "/" + tests.length + " passed", passed === tests.length);
      return passed === tests.length;
    }

    const top = document.getElementById("topActions");
    const autoAll = document.createElement("button");
    autoAll.className = "primary";
    autoAll.textContent = "运行全部自动测试";
    autoAll.onclick = () => runSuite("自动", autoTests);
    top.appendChild(autoAll);

    const allBtn = document.createElement("button");
    allBtn.className = "manual";
    allBtn.textContent = "运行全部（含手动，需配合操作）";
    allBtn.onclick = async () => {
      const a = await runSuite("自动", autoTests);
      const m = await runSuite("手动", manualTests);
      log("SUMMARY 全部: " + (a && m ? "ALL PASS" : "有失败"), a && m);
    };
    top.appendChild(allBtn);

    mountButtons("autoActions", autoTests);
    mountButtons("manualActions", manualTests, "manual");

    window.addEventListener("peachgen:native-event", (event) => {
      log("EVENT " + JSON.stringify(event.detail), null);
    });

    if (new URLSearchParams(location.search).get("auto") === "1") {
      setTimeout(() => autoAll.click(), 300);
    }
  </script>
</body>
</html>
